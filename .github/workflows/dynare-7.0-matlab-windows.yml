name: 'Dynare 7.0 with MATLAB R2025b on Windows '

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  dynare_7_0_matlab_r2025b_windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Add console option to Dynare calls in run_all_files
        run: |
          (Get-Content run_all_files.m) | ForEach-Object {
            if ($_ -match '^    dynare') { $_ + " console" } else { $_ }
          } | Set-Content run_all_files.m
        shell: pwsh
      
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
          products: Symbolic_Math_Toolbox Statistics_and_Machine_Learning_Toolbox Optimization_Toolbox Econometrics_Toolbox Parallel_Computing_Toolbox Control_System_Toolbox Global_Optimization_Toolbox
          cache: true
      
      - name: Download and extract Dynare 7.0
        run: |
          curl -L "https://www.dynare.org/release/windows-7z/dynare-7.0-win.7z" -o "dynare-7.0-win.7z"
          7z x "dynare-7.0-win.7z" "-oD:\hostedtoolcache\windows" -y
        shell: pwsh
          
      - name: run_all_files
        uses: matlab-actions/run-command@v2
        with:
          command: |            
            addpath("D:\hostedtoolcache\windows\dynare-7.0\matlab");
            run_all_files;

      - name: Prepare log files for artifact upload
        if: always()
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path . -Filter *.log -Recurse | ForEach-Object {
            $destPath = Join-Path -Path "artifacts" -ChildPath $_.DirectoryName.Substring($pwd.Path.Length)
            New-Item -ItemType Directory -Force -Path $destPath
            Copy-Item -Path $_.FullName -Destination $destPath
          }
        shell: pwsh

      - name: Upload log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-files-dynare-7-0-matlab-r2025b-windows
          path: artifacts/
